<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Gerenciar Aulas</title>
    <link rel="stylesheet" href="../css/edit_curso.css">
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <h1 id="trilha_nome">Carregando Trilha...</h1>
            <span id="trilha_desc">Aguarde um momento...</span>
        </div>
        <a href="edit_trilha.html" class="btn-cancel" style="text-decoration: none; font-size: 0.8rem;">← Voltar para
            Trilhas</a>
    </header>

    <main class="container-aulas">
        <!-- LADO ESQUERDO: EDITOR -->
        <section class="editor-area">
            <div class="card">
                <div class="card-header-aula">
                    <h2 id="titulo_editor">Nova Aula</h2>
                    <button id="btnNovaAula" class="btn-primary">+ Nova Aula</button>
                </div>

                <form id="formCurso" class="form-aula">
                    <input type="hidden" id="id_curso" name="id_curso">
                    <input type="hidden" id="id_trilha_hidden" name="id_trilha">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Título da Aula</label>
                            <input type="text" id="nome_aula" name="nome" required placeholder="Título da aula">
                        </div>
                        <div class="form-group" style="max-width: 100px;">
                            <label>Ordem</label>
                            <input type="number" id="ordem" name="ordem" min="1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descrição Curta</label>
                        <textarea id="descricao_aula" name="descricao" rows="2"
                            placeholder="Resumo da aula..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Link do Vídeo (YouTube)</label>
                        <input type="text" id="aula_video" name="aula_video" placeholder="https://www.youtube.com...">
                        <div id="video_preview" class="video-container" style="display:none; margin-top:15px;"></div>
                    </div>

                    <div class="form-group">
                        <label>Conteúdo em Texto</label>
                        <textarea id="aula_texto" name="aula_texto" rows="10"
                            placeholder="Conteúdo completo da aula..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status_aula" name="status">
                                <option value="0">0 - Criado</option>
                                <option value="1">1 - Ativo</option>
                                <option value="3">3 - Inativo</option>
                            </select>
                        </div>
                        <div class="form-group info-metadados">
                            <p>Criado: <span id="data_criacao">--</span></p>
                            <p>Atualizado: <span id="updated_at">--</span></p>
                        </div>
                    </div>

                    <div class="actions-aula">
                        <button type="button" id="btnExcluirAula" class="btn-del" style="display:none;">Excluir
                            Aula</button>
                        <button type="submit" class="btn-primary">Salvar Aula</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- LADO DIREITO: SIDEBAR -->
        <aside class="sidebar-aulas">
            <div class="card">
                <h3 class="sidebar-title">Conteúdo da Trilha</h3>
                <div id="listaAulas" class="lista-aulas-scroll">
                    <!-- Dinâmico -->
                </div>
            </div>
        </aside>
    </main>

    <script src="../js/edit_curso.js"></script>
</body>

</html>
