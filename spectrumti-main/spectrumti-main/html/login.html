<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <div class="background-overlay"></div>

    <div class="main-container">
        <main class="login-container">
            <div class="login-box">
                <h1 class="login-title">Login</h1>

                <form id="form-login" class="login-form" action="../backend/login.php" method="POST">
                    <input type="hidden" name="redirect" value="../html/login.html">
                    <div class="input-group">
                        <label for="input-email" class="input-label">E-mail</label>
                        <input type="email" id="input-email" name="email" class="input-field" required
                            placeholder="seu@gmail.com">
                    </div>

                    <div class="input-group">
                        <label for="input-senha" class="input-label">Senha</label>
                        <input type="password" id="input-senha" name="senha" class="input-field" required
                            placeholder="******">
                    </div>

                    <button type="submit" id="btn-login" class="submit-button">Acessar</button>

                    <div class="footer-link">
                        <a id="link-cadastro" href="../html/cadastro.html">Não tem uma conta? Entre aqui</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        async function redirectIfSession() {
            try {
                const res = await fetch('../backend/check_session.php', { cache: 'no-store' });
                if (!res.ok) return;
                const data = await res.json();
                if (data.loggedIn) {
                    window.location.href = 'trilha_cursos.html';
                }
            } catch (err) {
                console.warn('Sessão verificação falhou', err);
            }
        }
        redirectIfSession();
    </script>

</body>

</html>
